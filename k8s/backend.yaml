# USER SERVICE (8081)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: travel-booking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-app
          image: toursystem/user-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-db:3306/user_db?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MYSQL_ROOT_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: travel-booking-system
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
---
