# BOOKING SERVICE (8083)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: travel-booking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-app
          image: toursystem/booking-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-db:3306/booking_db?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MYSQL_ROOT_PASSWORD
            - name: SERVICES_USER_BASE_URL
              value: http://user-service:8081
            - name: SERVICES_CUSTOMER_BASE_URL
              value: http://customer-service:8082
            - name: SERVICES_TOUR_BASE_URL
              value: http://tour-service:8084
---
