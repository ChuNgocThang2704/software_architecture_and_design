---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-gateway
  namespace: travel-booking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway-app
          image: toursystem/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: http://tour-service:8084
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: http://customer-service:8082
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: http://booking-service:8083
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_URI
              value: http://user-service:8081
---
apiVersion: v1
kind: Service
metadata:
  name: travel-gateway
  namespace: travel-booking-system
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer